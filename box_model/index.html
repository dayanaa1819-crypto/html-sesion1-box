<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .padre{
        width: 500px;
        height: 400px;
        background-color: rgb(166, 91, 231);
        display: block;
        }
        .hijo{
            width: 200px;
            height: 200px;
            background-color: red;
            display: block;
            padding: 20px 30px 5px 10px;
            border-top: double 10px rgb(7, 253, 56);
            border-right: dashed 10px rgb(54, 244, 244);
            border-bottom: solid 10px rgb(217, 167, 28);
            border-bottom-width:5px;
            border-left: solid 10px rgb(56, 8, 229);
        }
    </style>
</head> 
   <body>
    <div class="padre">
        <div class="hijo">Hijo</div>
    </div>
   </body>
</html>
