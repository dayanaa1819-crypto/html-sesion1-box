<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <h1> Inline: </h1>
    <div class="inline bg-gray-600 text-white">Productos
    </div>
    <div class="inline bg-rose-700 text-white">Nosotros
    </div>
    <div class="inline bg-indigo-800 text-white">
        Servicios
    </div>
    <div class="inline bg-green-700 text-white">
        Contacto
    </div>
    <hr>
    <h1> Block: </h1>
    <div class="block bg-red-700 w-[200px] h-[100px] text-purple-300">
        Productos
    </div>
    <div class="block bg-yellow-400 w-[200px] h-[100px] text-green-300">
        Nosotros
    </div>
    <div class="block bg-purple-400 w-[200px] h-[100px] text-blue-300">
        Servicios
    </div>
    <div class="block bg-blue-700 w-[200px] h-[100px] text-orange-300">
        Contacto
    </div>
</body>
</html>
